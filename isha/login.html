<!DOCTYPE html>
<html>
<head>
    <title>Student Record System - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 420px;
            border: 1px solid #eee;
        }
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo h1 {
            font-size: 22px;
            color: #4a235a;
            margin-bottom: 5px;
        }
        .logo p {
            font-size: 13px;
            color: #999;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: #4a235a; }
        input::placeholder { color: #bbb; }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: #4a235a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
        }
        .login-btn:hover { background: #6b3580; }
        .error {
            color: red;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
        }
        .developer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>Student Record System</h1>
            <p>Sign in to your account</p>
        </div>

        <form onsubmit="validateForm(event)">
            <label>Email:</label>
            <input type="email" id="email"
                   placeholder="Enter your email" required>
            <span class="error" id="email_error"></span>

            <label>Password:</label>
            <input type="password" id="password"
                   placeholder="Enter your password" required>
            <span class="error" id="password_error"></span>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>

        <p class="developer">Developer: Isha | SRS-40</p>
    </div>
