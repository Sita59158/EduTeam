
<!DOCTYPE html>
<html>
<head>
    <title>Edu Team - Student Record System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f5; }
        .navbar {
            background: #4a235a;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-left { color: white; font-size: 16px; font-weight: 500; }
        .login-box {
            width: 350px;
            margin: 80px auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            border: 1px solid #eee;
        }
        .login-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 24px;
        }
        label {
            font-size: 13px;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: #4a235a; }
        .error {
            color: red;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background: #4a235a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .login-btn:hover { background: #6b3580; }
    </style>
</head>
<body>

    <div class="navbar">
        <span class="navbar-left">Edu Team - Student Record System</span>
    </div>

    <div class="login-box">
        <p class="login-title">Welcome Back!</p>
        <p class="login-subtitle">Please login to continue</p>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" />

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />

        <p class="error" id="error-msg">Invalid email or password!</p>

        <button class="login-btn" onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;

            if (email === 'sita@email.com' && password === '123456') {
                localStorage.setItem('loggedIn', 'true');
                window.location.href = '../sita/dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>

</body>
</html>
