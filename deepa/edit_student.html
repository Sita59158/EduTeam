<!DOCTYPE html>
<html>
<head>
    <title>Edu Team - Student Record System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f5;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .navbar {
            background: #4a235a; padding: 14px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar span { color: white; font-size: 16px; font-weight: 500; }
        .navbar-right { display: flex; align-items: center; gap: 20px; }
        .navbar-right a { color: #ddd; font-size: 13px; text-decoration: none; }
        .avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: #6b3580; display: flex;
            align-items: center; justify-content: center;
            color: white; font-size: 12px; font-weight: 500;
        }
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 480px;
            border: 1px solid #eee;
        }
        h1 { text-align: center; color: #4a235a;
             font-size: 22px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #999;
                    font-size: 13px; margin-bottom: 25px; }
        label { display: block; font-weight: 500;
                margin-bottom: 5px; color: #333; font-size: 14px; }
        input, select {
            width: 100%; padding: 11px 14px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; margin-bottom: 15px; outline: none;
        }
        input:focus, select:focus { border-color: #4a235a; }
        .update-btn {
            width: 100%; padding: 13px;
            background: #1565c0; color: white;
            border: none; border-radius: 8px;
            font-size: 15px; cursor: pointer; margin-top: 5px;
        }
        .update-btn:hover { background: #1976d2; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #4a235a; text-decoration: none; font-size: 13px; }
        .error { color: red; font-size: 12px; margin-top: -10px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="navbar">
        <span>Edu Team - Student Record System</span>
        <div class="navbar-right">
            <a href="../sita/dashboard.html">Dashboard</a>
            <a href="student_list.html">Students</a>
            <div class="avatar">DT</div>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <h1>Edit Student</h1>
            <p class="subtitle">Developer: Deepa Thapa | SRS-19</p>
            <form onsubmit="validateForm(event)">
                <label>Full Name:</label>
                <input type="text" id="full_name"
                       value="John Doe" required>
                <span class="error" id="full_name_error"></span>

                <label>Email:</label>
                <input type="email" id="email"
                       value="john@email.com" required>
                <span class="error" id="email_error"></span>

                <label>Teacher ID:</label>
                <input type="number" id="teacher_id"
                       value="1" required>
                <span class="error" id="teacher_id_error"></span>

                <label>Course ID:</label>
                <input type="number" id="course_id"
                       value="1" required>
                <span class="error" id="course_id_error"></span>

                <label>Enrolled Date:</label>
                <input type="date" id="enrolled_date" value="2026-01-01" required>

                <label>Status:</label>
                <select id="is_active">
                    <option value="1" selected>Active</option>
                    <option value="0">Inactive</option>
                </select>

                <button type="submit" class="update-btn">Update Student</button>
                <a href="student_list.html" class="back-link">&larr; Back to All Students</a>
            </form>
        </div>
    </div>

    <script>
        function validateForm(event) {
            event.preventDefault();
            let valid = true;
            let fullName = document.getElementById('full_name').value;
            if(fullName === '') {
                document.getElementById('full_name_error')
                .textContent = 'Full name is required!';
                valid = false;
            } else {
                document.getElementById('full_name_error')
                .textContent = '';
            }

            let email = document.getElementById('email').value;
            if(email === '') {
                document.getElementById('email_error')
                .textContent = 'Email is required!';
                valid = false;
            } else { document.getElementById('email_error').textContent = ''; }
            if(valid) {
                alert('Student updated successfully!');
                window.location = 'student_list.html';
            }
        }
    </script>
</body>
</html>
