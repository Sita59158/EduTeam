<!DOCTYPE html>
<html>
<head>
    <title>Add New Student</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f0f0f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 450px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4a235a;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus {
            border-color: #4a235a;
        }
        input::placeholder {
            color: #bbb;
        }
        .add-btn {
            width: 100%;
            padding: 14px;
            background-color: #4a235a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }
        .add-btn:hover {
            background-color: #6b3580;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4a235a;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error {
            color: red;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Add New Student</h1>
        <p class="subtitle">Developer: Deepa Thapa | SRS-19</p>
        
        <form onsubmit="validateForm(event)">
            
            <label>Full Name:</label>
            <input type="text" id="full_name" 
                   placeholder="Enter full name" required>
            <span class="error" id="full_name_error"></span>
            
            <label>Email:</label>
            <input type="email" id="email" 
                   placeholder="Enter email" required>
            <span class="error" id="email_error"></span>
            
            <label>Teacher ID:</label>
            <input type="number" id="teacher_id" 
                   placeholder="Enter teacher ID" required>
            <span class="error" id="teacher_id_error"></span>
            
            <label>Course ID:</label>
            <input type="number" id="course_id" 
                   placeholder="Enter course ID" required>
            <span class="error" id="course_id_error"></span>
            
            <label>Enrolled Date:</label>
            <input type="date" id="enrolled_date" required>
            
            <button type="submit" class="add-btn">
                Add Student
            </button>
            
            <a href="student_list.html" class="back-link">
                ← Back to All Students
            </a>
        </form>
    </div>

    <script>
        function validateForm(event) {
            event.preventDefault();
            let valid = true;

            let fullName = document.getElementById(
                'full_name').value;
            if(fullName === '') {
                document.getElementById('full_name_error')
                .textContent = 'Full name is required!';
                valid = false;
            } else {
                document.getElementById('full_name_error')
                .textContent = '';
            }

            let email = document.getElementById(
                'email').value;
            if(email === '') {
                document.getElementById('email_error')
                .textContent = 'Email is required!';
                valid = false;
            } else {
                document.getElementById('email_error')
                .textContent = '';
            }

            let teacherId = document.getElementById(
                'teacher_id').value;
            if(teacherId === '') {
                document.getElementById('teacher_id_error')
                .textContent = 'Teacher ID is required!';
                valid = false;
            } else {
                document.getElementById('teacher_id_error')
                .textContent = '';
            }

            let courseId = document.getElementById(
                'course_id').value;
            if(courseId === '') {
                document.getElementById('course_id_error')
                .textContent = 'Course ID is required!';
                valid = false;
            } else {
                document.getElementById('course_id_error')
                .textContent = '';
            }

            if(valid) {
                alert('Student added successfully!');
            }
        }
    </script>
</body>
</html>
